<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product Ranking Service</title>
    <style>
        :root {
            --bg: #f5f7f8;
            --panel: #ffffff;
            --panel-strong: #edf6f2;
            --text: #18201d;
            --muted: #64716c;
            --line: #d9e1de;
            --accent: #167a5b;
            --accent-dark: #0f6147;
            --danger: #b3363a;
            --danger-bg: #fff1f1;
            --focus: #edb83d;
            --shadow: 0 12px 32px rgba(31, 45, 39, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, "Segoe UI", Arial, sans-serif;
            font-size: 15px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .shell {
            width: min(1240px, calc(100% - 32px));
            margin: 0 auto;
            padding: 24px 0 36px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        .brand {
            display: grid;
            gap: 4px;
        }

        .brand h1 {
            margin: 0;
            font-size: 28px;
            line-height: 1.15;
            letter-spacing: 0;
        }

        .brand span {
            color: var(--muted);
            font-size: 14px;
        }

        .quick-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .link-pill,
        .tab,
        button {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            color: var(--text);
            cursor: pointer;
            font: inherit;
            min-height: 38px;
        }

        .link-pill {
            display: inline-flex;
            align-items: center;
            padding: 0 12px;
            color: var(--accent-dark);
            font-weight: 700;
        }

        .tabs {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0 18px;
        }

        .tab {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 132px;
            padding: 0 14px;
            white-space: nowrap;
        }

        .tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #ffffff;
            font-weight: 700;
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
            gap: 18px;
            align-items: start;
        }

        .tool,
        .table-wrap,
        .rating-band {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .tool {
            padding: 18px;
        }

        .tool h2,
        .table-title h2,
        .rating-band h2 {
            margin: 0;
            font-size: 18px;
            line-height: 1.25;
            letter-spacing: 0;
        }

        .tool form {
            display: grid;
            gap: 13px;
            margin-top: 18px;
        }

        label {
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        input,
        select {
            width: 100%;
            min-height: 40px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px 10px;
            background: #ffffff;
            color: var(--text);
            font: inherit;
        }

        input:focus,
        select:focus,
        button:focus,
        a:focus {
            outline: 3px solid rgba(237, 184, 61, 0.45);
            outline-offset: 2px;
        }

        .form-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .primary,
        .secondary,
        .icon-btn,
        .danger {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 0 12px;
            font-weight: 700;
        }

        .primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #ffffff;
        }

        .primary:hover {
            background: var(--accent-dark);
        }

        .secondary:hover,
        .icon-btn:hover {
            background: var(--panel-strong);
        }

        .danger {
            background: var(--danger-bg);
            border-color: #efc5c7;
            color: var(--danger);
        }

        .table-wrap {
            min-width: 0;
            overflow: hidden;
        }

        .table-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 18px;
            border-bottom: 1px solid var(--line);
        }

        .table-title span {
            color: var(--muted);
            white-space: nowrap;
        }

        .table-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 720px;
        }

        th,
        td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid var(--line);
            vertical-align: middle;
        }

        th {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0;
            background: #fbfcfc;
        }

        td {
            max-width: 260px;
        }

        .actions {
            display: flex;
            gap: 8px;
            width: max-content;
        }

        .icon-btn {
            width: 38px;
            padding: 0;
        }

        .muted,
        .empty {
            color: var(--muted);
        }

        .empty {
            padding: 22px 18px;
        }

        .id {
            font-family: "Cascadia Mono", Consolas, monospace;
            font-size: 12px;
            color: #4f5b57;
        }

        .status {
            min-height: 22px;
            margin-top: 12px;
            color: var(--muted);
        }

        .status.error {
            color: var(--danger);
        }

        .rating-layout {
            display: grid;
            gap: 18px;
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(4, minmax(160px, 1fr));
            gap: 12px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 16px;
            box-shadow: var(--shadow);
        }

        .rating-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .rating-band {
            overflow: hidden;
        }

        .rating-band h2 {
            padding: 16px 18px;
            border-bottom: 1px solid var(--line);
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(280px, 1fr));
            gap: 18px;
            align-items: start;
        }

        .score {
            display: inline-flex;
            min-width: 58px;
            justify-content: center;
            border-radius: 999px;
            background: #e7f5ef;
            color: var(--accent-dark);
            padding: 4px 10px;
            font-weight: 800;
        }

        @media (max-width: 860px) {
            .shell {
                width: min(100% - 20px, 1240px);
                padding-top: 16px;
            }

            .topbar,
            .workspace,
            .rating-grid,
            .events-grid {
                grid-template-columns: 1fr;
                display: grid;
            }

            .quick-links {
                justify-content: start;
            }

            .filters {
                grid-template-columns: 1fr 1fr;
            }

            .brand h1 {
                font-size: 23px;
            }
        }

        @media (max-width: 560px) {
            .filters {
                grid-template-columns: 1fr;
            }

            .tab {
                min-width: 118px;
            }
        }
    </style>
</head>
<body>
<div class="shell">
    <header class="topbar">
        <div class="brand">
            <h1>Product Ranking Service</h1>
            <span>Доменная модель, CRUD и витринные рейтинги</span>
        </div>
        <div class="quick-links">
            <a class="link-pill" href="/swagger-ui/index.html" title="Swagger UI">API</a>
        </div>
    </header>

    <nav class="tabs" aria-label="Разделы">
        <button class="tab active" data-view="products" type="button">Товары</button>
        <button class="tab" data-view="categories" type="button">Категории</button>
        <button class="tab" data-view="pricing" type="button">Цены</button>
        <button class="tab" data-view="inventory" type="button">Остатки</button>
        <button class="tab" data-view="events" type="button">События</button>
        <button class="tab" data-view="ranking" type="button">Рейтинг</button>
    </nav>

    <main id="app"></main>
</div>

<script>
    const apiBase = {
        products: "/api/products",
        categories: "/api/categories",
        pricing: "/api/pricing",
        inventory: "/api/inventory"
    };

    const state = {
        active: "products",
        editing: {},
        data: { products: [], categories: [], pricing: [], inventory: [] },
        ranking: { windowDays: 7, limit: 5, categoryId: "" },
        status: ""
    };

    const config = {
        products: {
            title: "Товар",
            listTitle: "Товары",
            fields: [
                { name: "name", label: "Название", type: "text", required: true },
                { name: "categoryId", label: "Категория", type: "select", source: "categories" },
                { name: "pricingId", label: "Цена", type: "select", source: "pricing" },
                { name: "inventoryId", label: "Остаток", type: "select", source: "inventory" }
            ],
            columns: [
                { title: "Название", render: item => escapeHtml(item.name) },
                { title: "Категория", render: item => escapeHtml(item.categoryName) },
                { title: "Цена", render: item => money(item.price) },
                { title: "Остаток", render: item => item.quantity },
                { title: "ID", render: item => `<span class="id">${shortId(item.id)}</span>` }
            ]
        },
        categories: {
            title: "Категория",
            listTitle: "Категории",
            fields: [{ name: "name", label: "Название", type: "text", required: true }],
            columns: [
                { title: "Название", render: item => escapeHtml(item.name) },
                { title: "ID", render: item => `<span class="id">${shortId(item.id)}</span>` }
            ]
        },
        pricing: {
            title: "Цена",
            listTitle: "Цены",
            fields: [{ name: "price", label: "Цена", type: "number", min: 0, step: "0.01", required: true }],
            columns: [
                { title: "Цена", render: item => money(item.price) },
                { title: "ID", render: item => `<span class="id">${shortId(item.id)}</span>` }
            ]
        },
        inventory: {
            title: "Остаток",
            listTitle: "Остатки",
            fields: [{ name: "quantity", label: "Количество", type: "number", min: 0, step: "1", required: true }],
            columns: [
                { title: "Количество", render: item => item.quantity },
                { title: "ID", render: item => `<span class="id">${shortId(item.id)}</span>` }
            ]
        }
    };

    document.querySelectorAll(".tab").forEach(button => {
        button.addEventListener("click", () => {
            state.active = button.dataset.view;
            state.status = "";
            document.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab === button));
            render();
        });
    });

    async function request(url, options = {}) {
        const response = await fetch(url, {
            headers: { "Content-Type": "application/json" },
            ...options
        });
        if (!response.ok) {
            let message = `${response.status} ${response.statusText}`;
            try {
                const payload = await response.json();
                message = payload.message || message;
            } catch (error) {
                // The HTTP status is enough for empty error responses.
            }
            throw new Error(message);
        }
        if (response.status === 204) {
            return null;
        }
        return response.json();
    }

    async function loadAll() {
        const [categories, pricing, inventory, products] = await Promise.all([
            request(apiBase.categories),
            request(apiBase.pricing),
            request(apiBase.inventory),
            request(apiBase.products)
        ]);
        state.data = { categories, pricing, inventory, products };
        if (!state.ranking.categoryId && categories.length) {
            state.ranking.categoryId = categories[0].id;
        }
    }

    function render() {
        if (state.active === "ranking") {
            renderRanking();
            return;
        }
        if (state.active === "events") {
            renderEvents();
            return;
        }
        renderCrud(state.active);
    }

    function renderEvents() {
        const app = document.getElementById("app");
        app.innerHTML = `
            <section class="events-grid">
                <aside class="tool">
                    <h2>Продажа</h2>
                    <form data-event-form="sale">
                        <label>Товар
                            <select name="productId" required>
                                <option value="">Выберите товар</option>
                                ${state.data.products.map(product => `<option value="${product.id}">${escapeHtml(product.name)} · ${money(product.price)}</option>`).join("")}
                            </select>
                        </label>
                        <label>Количество
                            <input name="quantity" type="number" min="1" step="1" value="1" required>
                        </label>
                        <label>Цена за единицу
                            <input name="price" type="number" min="0" step="0.01">
                        </label>
                        <label>User ID
                            <input name="userId" type="text" placeholder="UUID">
                        </label>
                        <div class="form-actions">
                            <button class="primary" type="submit" title="Записать продажу"><span aria-hidden="true">+</span>Записать</button>
                        </div>
                    </form>
                </aside>
                <aside class="tool">
                    <h2>Клик</h2>
                    <form data-event-form="click">
                        <label>Товар
                            <select name="productId" required>
                                <option value="">Выберите товар</option>
                                ${state.data.products.map(product => `<option value="${product.id}">${escapeHtml(product.name)}</option>`).join("")}
                            </select>
                        </label>
                        <label>User ID
                            <input name="userId" type="text" placeholder="UUID">
                        </label>
                        <div class="form-actions">
                            <button class="primary" type="submit" title="Записать клик"><span aria-hidden="true">+</span>Записать</button>
                        </div>
                    </form>
                    <div class="status ${state.status.startsWith("Ошибка") ? "error" : ""}">${state.status}</div>
                </aside>
            </section>
        `;
    }

    function renderCrud(entity) {
        const app = document.getElementById("app");
        const cfg = config[entity];
        const current = state.editing[entity]
            ? state.data[entity].find(item => item.id === state.editing[entity])
            : null;
        app.innerHTML = `
            <section class="workspace">
                <aside class="tool">
                    <h2>${current ? "Редактирование" : "Создание"}: ${cfg.title}</h2>
                    <form data-form="${entity}">
                        ${cfg.fields.map(field => inputHtml(field, current)).join("")}
                        <div class="form-actions">
                            <button class="primary" type="submit" title="Сохранить"><span aria-hidden="true">+</span>${current ? "Обновить" : "Создать"}</button>
                            ${current ? `<button class="secondary" type="button" data-cancel="${entity}" title="Сбросить форму">Сброс</button>` : ""}
                        </div>
                    </form>
                    <div class="status ${state.status.startsWith("Ошибка") ? "error" : ""}">${state.status}</div>
                </aside>
                <section class="table-wrap">
                    <div class="table-title">
                        <h2>${cfg.listTitle}</h2>
                        <span>${state.data[entity].length} записей</span>
                    </div>
                    ${tableHtml(entity)}
                </section>
            </section>
        `;
    }

    function inputHtml(field, current) {
        const value = current ? current[field.name] || "" : "";
        if (field.type === "select") {
            const rows = state.data[field.source];
            return `
                <label>${field.label}
                    <select name="${field.name}" required>
                        <option value="">Выберите значение</option>
                        ${rows.map(row => `<option value="${row.id}" ${value === row.id ? "selected" : ""}>${escapeHtml(selectLabel(field.source, row))}</option>`).join("")}
                    </select>
                </label>
            `;
        }
        return `
            <label>${field.label}
                <input name="${field.name}" type="${field.type}" value="${escapeAttr(value)}"
                    ${field.required ? "required" : ""} ${field.min !== undefined ? `min="${field.min}"` : ""}
                    ${field.step ? `step="${field.step}"` : ""}>
            </label>
        `;
    }

    function tableHtml(entity) {
        const rows = state.data[entity];
        if (!rows.length) {
            return `<div class="empty">Записей пока нет</div>`;
        }
        const cfg = config[entity];
        return `
            <div class="table-scroll">
                <table>
                    <thead>
                    <tr>
                        ${cfg.columns.map(column => `<th>${column.title}</th>`).join("")}
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    ${rows.map(item => `
                        <tr>
                            ${cfg.columns.map(column => `<td>${column.render(item)}</td>`).join("")}
                            <td>
                                <div class="actions">
                                    <button class="icon-btn" type="button" data-edit="${entity}" data-id="${item.id}" title="Редактировать">E</button>
                                    <button class="icon-btn danger" type="button" data-delete="${entity}" data-id="${item.id}" title="Удалить">X</button>
                                </div>
                            </td>
                        </tr>
                    `).join("")}
                    </tbody>
                </table>
            </div>
        `;
    }

    async function renderRanking() {
        const app = document.getElementById("app");
        app.innerHTML = `<div class="empty">Загрузка рейтинга...</div>`;
        try {
            const categories = state.data.categories;
            const categoryId = state.ranking.categoryId || (categories[0] && categories[0].id) || "";
            const params = `windowDays=${state.ranking.windowDays}&limit=${state.ranking.limit}`;
            const [globalTop, categoryTop, topOrders] = await Promise.all([
                request(`/api/ranking/top?${params}`),
                categoryId ? request(`/api/ranking/categories/${categoryId}/top?${params}`) : Promise.resolve([]),
                request(`/api/ranking/orders/top?limit=${state.ranking.limit}`)
            ]);
            app.innerHTML = `
                <section class="rating-layout">
                    <div class="filters">
                        <label>Окно
                            <select data-rank-field="windowDays">
                                <option value="7" ${state.ranking.windowDays === 7 ? "selected" : ""}>7 дней</option>
                                <option value="30" ${state.ranking.windowDays === 30 ? "selected" : ""}>30 дней</option>
                            </select>
                        </label>
                        <label>Лимит
                            <input data-rank-field="limit" type="number" min="1" max="100" value="${state.ranking.limit}">
                        </label>
                        <label>Категория
                            <select data-rank-field="categoryId">
                                ${categories.map(category => `<option value="${category.id}" ${category.id === categoryId ? "selected" : ""}>${escapeHtml(category.name)}</option>`).join("")}
                            </select>
                        </label>
                        <label>Страница
                            <input value="Топы заказов" disabled>
                        </label>
                    </div>
                    <div class="rating-grid">
                        ${rankingTable("Глобальный топ товаров", globalTop)}
                        ${rankingTable("Топ товаров категории", categoryTop)}
                    </div>
                    ${ordersTable(topOrders)}
                </section>
            `;
        } catch (error) {
            app.innerHTML = `<div class="empty">Ошибка загрузки рейтинга: ${escapeHtml(error.message)}</div>`;
        }
    }

    function rankingTable(title, rows) {
        return `
            <section class="rating-band">
                <h2>${title}</h2>
                <div class="table-scroll">
                    <table>
                        <thead>
                        <tr>
                            <th>Score</th>
                            <th>Товар</th>
                            <th>Категория</th>
                            <th>Цена</th>
                            <th>Остаток</th>
                        </tr>
                        </thead>
                        <tbody>
                        ${rows.map(row => `
                            <tr>
                                <td><span class="score">${row.score}</span></td>
                                <td>${escapeHtml(row.productName)}</td>
                                <td>${escapeHtml(row.categoryName)}</td>
                                <td>${money(row.price)}</td>
                                <td>${row.quantity}</td>
                            </tr>
                        `).join("") || `<tr><td colspan="5" class="muted">Нет данных</td></tr>`}
                        </tbody>
                    </table>
                </div>
            </section>
        `;
    }

    function ordersTable(rows) {
        return `
            <section class="rating-band">
                <h2>Топ заказов</h2>
                <div class="table-scroll">
                    <table>
                        <thead>
                        <tr>
                            <th>Score</th>
                            <th>Заказ</th>
                            <th>Пользователь</th>
                            <th>Сумма</th>
                            <th>Позиций</th>
                            <th>Дата покупки</th>
                        </tr>
                        </thead>
                        <tbody>
                        ${rows.map(row => `
                            <tr>
                                <td><span class="score">${row.score}</span></td>
                                <td><span class="id">${shortId(row.orderId)}</span></td>
                                <td><span class="id">${shortId(row.userId)}</span></td>
                                <td>${money(row.totalPrice)}</td>
                                <td>${row.itemsCount}</td>
                                <td>${dateTime(row.purchasedAt)}</td>
                            </tr>
                        `).join("") || `<tr><td colspan="6" class="muted">Нет данных</td></tr>`}
                        </tbody>
                    </table>
                </div>
            </section>
        `;
    }

    document.addEventListener("submit", async event => {
        const form = event.target.closest("form[data-form]");
        if (!form) {
            return;
        }
        event.preventDefault();
        const entity = form.dataset.form;
        const payload = Object.fromEntries(new FormData(form).entries());
        if (entity === "pricing") {
            payload.price = Number(payload.price);
        }
        if (entity === "inventory") {
            payload.quantity = Number(payload.quantity);
        }
        try {
            const id = state.editing[entity];
            await request(id ? `${apiBase[entity]}/${id}` : apiBase[entity], {
                method: id ? "PUT" : "POST",
                body: JSON.stringify(payload)
            });
            state.editing[entity] = null;
            state.status = "Сохранено";
            await loadAll();
            renderCrud(entity);
        } catch (error) {
            state.status = `Ошибка: ${error.message}`;
            renderCrud(entity);
        }
    });

    document.addEventListener("submit", async event => {
        const form = event.target.closest("form[data-event-form]");
        if (!form) {
            return;
        }
        event.preventDefault();
        const values = Object.fromEntries(new FormData(form).entries());
        const userId = values.userId && values.userId.trim() ? values.userId.trim() : undefined;
        try {
            if (form.dataset.eventForm === "sale") {
                const item = {
                    productId: values.productId,
                    quantity: Number(values.quantity)
                };
                if (values.price) {
                    item.price = Number(values.price);
                }
                await request("/api/sales/append", {
                    method: "POST",
                    body: JSON.stringify({ userId, items: [item] })
                });
                state.status = "Продажа записана";
            } else {
                await request("/api/clicks/append", {
                    method: "POST",
                    body: JSON.stringify({ userId, productId: values.productId })
                });
                state.status = "Клик записан";
            }
            await loadAll();
            renderEvents();
        } catch (error) {
            state.status = `Ошибка: ${error.message}`;
            renderEvents();
        }
    });

    document.addEventListener("click", async event => {
        const edit = event.target.closest("[data-edit]");
        const remove = event.target.closest("[data-delete]");
        const cancel = event.target.closest("[data-cancel]");
        if (edit) {
            state.editing[edit.dataset.edit] = edit.dataset.id;
            state.status = "";
            renderCrud(edit.dataset.edit);
        }
        if (cancel) {
            state.editing[cancel.dataset.cancel] = null;
            state.status = "";
            renderCrud(cancel.dataset.cancel);
        }
        if (remove) {
            const entity = remove.dataset.delete;
            const item = state.data[entity].find(row => row.id === remove.dataset.id);
            if (!window.confirm(`Удалить: ${displayName(entity, item)}?`)) {
                return;
            }
            try {
                await request(`${apiBase[entity]}/${remove.dataset.id}`, { method: "DELETE" });
                state.status = "Удалено";
                await loadAll();
                renderCrud(entity);
            } catch (error) {
                state.status = `Ошибка: ${error.message}`;
                renderCrud(entity);
            }
        }
    });

    document.addEventListener("change", event => {
        const field = event.target.dataset.rankField;
        if (!field) {
            return;
        }
        updateRankingField(field, event.target.value);
    });

    document.addEventListener("input", event => {
        const field = event.target.dataset.rankField;
        if (field === "limit") {
            updateRankingField(field, event.target.value);
        }
    });

    function updateRankingField(field, value) {
        if (field === "windowDays" || field === "limit") {
            state.ranking[field] = Number(value);
        } else {
            state.ranking[field] = value;
        }
        renderRanking();
    }

    function selectLabel(source, row) {
        if (source === "categories") {
            return row.name;
        }
        if (source === "pricing") {
            return `${money(row.price)} · ${shortId(row.id)}`;
        }
        return `${row.quantity} шт. · ${shortId(row.id)}`;
    }

    function displayName(entity, item) {
        if (!item) {
            return entity;
        }
        if (entity === "pricing") {
            return money(item.price);
        }
        if (entity === "inventory") {
            return `${item.quantity} шт.`;
        }
        return item.name;
    }

    function money(value) {
        return new Intl.NumberFormat("ru-RU", { style: "currency", currency: "RUB", maximumFractionDigits: 2 }).format(Number(value || 0));
    }

    function dateTime(value) {
        return new Intl.DateTimeFormat("ru-RU", { dateStyle: "medium", timeStyle: "short" }).format(new Date(value));
    }

    function shortId(id) {
        return String(id || "").slice(0, 8);
    }

    function escapeAttr(value) {
        return escapeHtml(String(value || "")).replace(/"/g, "&quot;");
    }

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
    }

    loadAll()
        .then(render)
        .catch(error => {
            document.getElementById("app").innerHTML = `<div class="empty">Ошибка запуска UI: ${escapeHtml(error.message)}</div>`;
        });
</script>
</body>
</html>
