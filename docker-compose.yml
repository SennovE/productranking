services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: product-ranking-service
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/actuator/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
