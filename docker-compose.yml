services:
  postgres:
    image: postgres:16-alpine
    container_name: product-ranking-postgres
    environment:
      POSTGRES_DB: product_ranking
      POSTGRES_USER: product_ranking
      POSTGRES_PASSWORD: product_ranking
    ports:
      - "5432:5432"
    volumes:
      - product-ranking-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product_ranking -d product_ranking"]
      interval: 10s
      timeout: 5s
      retries: 6

  kafka:
    image: apache/kafka:3.7.2
    container_name: product-ranking-kafka
    hostname: kafka
    ports:
      - "9092:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: product-ranking-kafka-ui
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: product-ranking-service
    expose:
      - "8080"
      - "9090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/product_ranking
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: product_ranking
      SPRING_DATASOURCE_PASSWORD: product_ranking
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_KAFKA_LISTENER_ENABLED: "true"
      APP_GRPC_PORT: 9090
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/actuator/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  grpc-ui:
    image: fullstorydev/grpcui:latest
    container_name: product-ranking-grpc-ui
    command:
      - -plaintext
      - -bind
      - 0.0.0.0
      - -port
      - "8080"
      - -open-browser=false
      - app:9090
    expose:
      - "8080"
    depends_on:
      app:
        condition: service_healthy

  proxy:
    image: nginx:1.27-alpine
    container_name: product-ranking-proxy
    ports:
      - "8080:8080"
      - "8082:8082"
      - "9090:9090"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      app:
        condition: service_healthy
      grpc-ui:
        condition: service_started

volumes:
  product-ranking-postgres:
