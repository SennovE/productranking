events {
}

http {
    upstream product_ranking_http {
        server app:8080;
    }

    upstream product_ranking_grpc {
        server app:9090;
    }

    upstream product_ranking_grpc_ui {
        server grpc-ui:8080;
    }

    server {
        listen 8080;

        auth_basic "Product Ranking Service";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            proxy_pass http://product_ranking_http;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 8082;

        auth_basic "Product Ranking gRPC UI";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            proxy_pass http://product_ranking_grpc_ui;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 9090;
        http2 on;

        auth_basic "Product Ranking gRPC";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            grpc_pass grpc://product_ranking_grpc;
            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
